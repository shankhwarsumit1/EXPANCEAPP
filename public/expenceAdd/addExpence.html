<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day to Day Expenses</title>
    <link rel="stylesheet" href="addExpense.css">
</head>
<body>
    <div class="container">
        <header>
            <h2>Day to Day Expenses</h2>
            <div class="datetime" id="datetime"></div>
        </header>
        <form class="form-container">
            <label for="expenseAmount">ExpenceAmount</label>
            <input type="text" name="expenseAmount" id="expenseAmount">
            <label for="description">Description</label>
            <input type="text" name="description" id="description">
            <label for="category">Category</label>
            <select name="category" id="category">
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="utilities">Utilities</option>
                <option value="entertainment">Entertainment</option>
                <option value="other">Other</option>
            </select>
            <button type="submit">Add Expense</button>
        </form>
        <ul id="expense-list"></ul>
        <button type="button" id="premium">Buy Premium membership</button>
        <button type="button" id="leaderboard">Show leaderboard</button>

        <section class="report-section">
            <h3 id="year-title">2021</h3>
            <div id="month-report"></div>
            <div id="yearly-report"></div>
            <div id="notes-report"></div>
        </section>
        <button id="download-btn" disabled>
            <span>&#8681;</span>
        </button>
    </div>
    <script>
        // --- Only for UI demo, does not affect your addExpense.js logic ---
        // Dummy data for demonstration
        const expenses = [
            { date: "01-03-2021", description: "Milk", category: "Milk", income: "", expense: 60 },
            { date: "04-03-2021", description: "Salary", category: "Salary", income: 40000, expense: "" },
            { date: "04-03-2021", description: "Fruits", category: "Fruits", income: "", expense: 500 },
            { date: "04-03-2021", description: "Medicines", category: "Health", income: "", expense: 50 },
            { date: "05-03-2021", description: "Salary", category: "Salary", income: 20000, expense: "" },
            { date: "05-03-2021", description: "Milk", category: "Milk", income: "", expense: 60 },
            { date: "05-03-2021", description: "Fees", category: "Education", income: "", expense: 4000 },
            { date: "05-03-2021", description: "Party", category: "Birthday Treat", income: "", expense: 500 },
            { date: "05-03-2021", description: "Travel", category: "Auto And Transport", income: "", expense: 500 }
        ];
        const notes = [
            { date: "11-02-2021", note: "Gave advance to construction." },
            { date: "16-02-2021", note: "Fghj hhj hju" },
            { date: "17-02-2021", note: "17 17 17" },
            { date: "18-02-2021", note: "18" }
        ];
        function formatCurrency(val) {
            return val ? "₹ " + Number(val).toLocaleString("en-IN", {minimumFractionDigits:2}) : "";
        }
        function renderDateTime() {
            const now = new Date();
            const dt = now.toLocaleString('en-GB', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            document.getElementById('datetime').textContent = dt;
        }
        function renderMonthReport() {
            let html = `<table>
                <thead>
                    <tr>
                        <th>Date</th><th>Description</th><th>Category</th><th>Income</th><th>Expense</th>
                    </tr>
                </thead>
                <tbody>`;
            let totalIncome = 0, totalExpense = 0;
            for (const exp of expenses) {
                html += `<tr>
                    <td>${exp.date}</td>
                    <td>${exp.description}</td>
                    <td>${exp.category}</td>
                    <td>${formatCurrency(exp.income)}</td>
                    <td>${formatCurrency(exp.expense)}</td>
                </tr>`;
                totalIncome += Number(exp.income) || 0;
                totalExpense += Number(exp.expense) || 0;
            }
            html += `</tbody>
                <tfoot>
                    <tr>
                        <td colspan="3"></td>
                        <td>${formatCurrency(totalIncome)}</td>
                        <td class="expense">${formatCurrency(totalExpense)}</td>
                    </tr>
                </tfoot>
            </table>`;
            document.getElementById('month-report').innerHTML = html;
            return { totalIncome, totalExpense };
        }
        function renderYearlyReport(totalIncome, totalExpense) {
            const savings = totalIncome - totalExpense;
            let html = `<table>
                <thead>
                    <tr><th>Month</th><th>Income</th><th>Expense</th><th>Savings</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td>March</td>
                        <td>${formatCurrency(totalIncome)}</td>
                        <td class="expense">${formatCurrency(totalExpense)}</td>
                        <td>${formatCurrency(savings)}</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="1">${formatCurrency(totalIncome)}</td>
                        <td class="expense">${formatCurrency(totalExpense)}</td>
                        <td>${formatCurrency(savings)}</td>
                    </tr>
                </tfoot>
            </table>`;
            document.getElementById('yearly-report').innerHTML = `<h4>Yearly Report</h4>${html}`;
        }
        function renderNotesReport() {
            let html = `<table>
                <thead>
                    <tr><th>Date</th><th>Notes</th></tr>
                </thead>
                <tbody>`;
            for (const n of notes) {
                html += `<tr><td>${n.date}</td><td>${n.note}</td></tr>`;
            }
            html += `</tbody></table>`;
            document.getElementById('notes-report').innerHTML = `<h4>Notes Report 2021</h4>${html}`;
        }
        function setupDownloadButton() {
            const btn = document.getElementById('download-btn');
            // Replace this with your real premium check if needed
            const isPremium = false; // set to true to enable
            if (isPremium) {
                btn.disabled = false;
                btn.title = "Download Expenses";
                btn.addEventListener('click', () => {
                    // Download as CSV
                    let csv = "Date,Description,Category,Income,Expense\n";
                    for (const exp of expenses) {
                        csv += `${exp.date},${exp.description},${exp.category},${exp.income || ""},${exp.expense || ""}\n`;
                    }
                    const blob = new Blob([csv], { type: "text/csv" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "expenses.csv";
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
            } else {
                btn.disabled = true;
                btn.title = "Download available for premium users only";
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            renderDateTime();
            const { totalIncome, totalExpense } = renderMonthReport();
            renderYearlyReport(totalIncome, totalExpense);
            renderNotesReport();
            setupDownloadButton();
        });
    </script>
    <script src="./addExpense.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"></script>
</body>
</html>
