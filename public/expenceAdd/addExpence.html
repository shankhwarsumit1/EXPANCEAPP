<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day to Day Expenses</title>
  <link rel="stylesheet" href="addExpense.css">
</head>
<body>
  <div class="container">
    <header>
      <h2>Day to Day Expenses</h2>
      <div class="datetime" id="datetime"></div>
    </header>
    <form class="form-container">
      <label for="expenseAmount">Expense Amount</label>
      <input type="text" name="expenseAmount" id="expenseAmount" required>
      <label for="description">Description</label>
      <input type="text" name="description" id="description" required>
      <label for="category">Category</label>
      <select name="category" id="category">
        <option value="food">Food</option>
        <option value="transport">Transport</option>
        <option value="utilities">Utilities</option>
        <option value="entertainment">Entertainment</option>
        <option value="other">Other</option>
      </select>
      <button type="submit">Add Expense</button>
    </form>

    <div id="premium-msg"></div>
    <button type="button" id="premium">Buy Premium membership</button>
    <button type="button" id="leaderboard">Show leaderboard</button>

    <ul id="expense-list"></ul>

    <div id="pagination-controls">
      <label for="page-size">Items per page:</label>
      <select id="page-size">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
      <button id="prev-page">Prev</button>
      <span id="page-info"></span>
      <button id="next-page">Next</button>
    </div>

    <button id="download-btn" disabled><span>&#8681;</span></button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"></script>
  <script src="addExpense.js"></script>
</body>
</html>
