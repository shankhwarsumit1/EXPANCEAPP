<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <h1>Login</h1>
<div class="login-container">   
    <label for="email">Enter Email:</label>
    <input type="email" name="email" id="email">

    <label for="password">Enter Password</label>
    <input type="password" name="password" id="password">

    <button type="submit" id="login-btn">Login</button>
</div> 
<a href="../signup/signup.html">SignUp</a>

<!-- Forgot Password Button -->
<button id="forgot-btn" type="button">Forgot Password?</button>

<!-- Forgot Password Form (hidden by default) -->
<form id="forgot-form" style="display:none; margin-top:10px;">
    <label for="forgot-email">Enter your email:</label>
    <input type="email" id="forgot-email" required>
    <button type="submit">Send Reset Link</button>
</form>
</body>
<script src="./login.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.9.0/axios.min.js"></script>

</html>
